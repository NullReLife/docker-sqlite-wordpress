name: Build and publish Docker images

on:
  push:
    branches:
      - main
      - native-parser
      - realtime-update
    paths:
      - Dockerfile
      - docker-compose.yml
      - scripts/**
      - .github/workflows/docker-ghcr.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-ghcr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  resolve-inputs:
    name: Resolve build inputs
    runs-on: ubuntu-latest
    timeout-minutes: 5

    outputs:
      wordpress_image: ${{ steps.resolve.outputs.wordpress_image }}
      wordpress_http_port: ${{ steps.resolve.outputs.wordpress_http_port }}
      sqlite_database_integration_version: ${{ steps.resolve.outputs.sqlite_database_integration_version }}
      sqlite_database_integration_commit: ${{ steps.resolve.outputs.sqlite_database_integration_commit }}
      update_cache_bust: ${{ steps.resolve.outputs.update_cache_bust }}
      version_tag: ${{ steps.resolve.outputs.version_tag }}
      channel_tag: ${{ steps.resolve.outputs.channel_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve inputs
        id: resolve
        shell: bash
        run: |
          set -euo pipefail

          branch="${GITHUB_REF_NAME}"

          case "${branch}" in
            main)
              WORDPRESS_IMAGE="wordpress:7.0.0-php8.5-apache"
              WORDPRESS_HTTP_PORT="7860"
              SQLITE_DATABASE_INTEGRATION_VERSION="2.2.23"
              SQLITE_DATABASE_INTEGRATION_COMMIT="e5513936c800f14b6795e7fce71505afad331b11"
              UPDATE_CACHE_BUST="manual"
              version_tag="7.0.0-php8.5-apache-sqlite-2.2.23"
              channel_tag="main"
              ;;
            native-parser)
              WORDPRESS_IMAGE="wordpress:7.0.0-php8.5-apache"
              WORDPRESS_HTTP_PORT="7860"
              SQLITE_DATABASE_INTEGRATION_VERSION="2.2.23"
              SQLITE_DATABASE_INTEGRATION_COMMIT="e5513936c800f14b6795e7fce71505afad331b11"
              UPDATE_CACHE_BUST="manual"
              version_tag="7.0.0-php8.5-apache-native-parser"
              channel_tag="native-parser"
              ;;
            realtime-update)
              env_file="$(mktemp)"
              bash scripts/resolve-latest-versions.sh --output "${env_file}"
              # shellcheck disable=SC1090
              . "${env_file}"
              rm -f "${env_file}"

              wordpress_tag="${WORDPRESS_IMAGE#wordpress:}"
              version_tag="${wordpress_tag}-sqlite-${SQLITE_DATABASE_INTEGRATION_SHORT_COMMIT}-native-parser"
              channel_tag="realtime-update"
              SQLITE_DATABASE_INTEGRATION_VERSION="source-latest"
              ;;
            *)
              echo "Unsupported branch: ${branch}" >&2
              exit 1
              ;;
          esac

          {
            echo "wordpress_image=${WORDPRESS_IMAGE}"
            echo "wordpress_http_port=${WORDPRESS_HTTP_PORT}"
            echo "sqlite_database_integration_version=${SQLITE_DATABASE_INTEGRATION_VERSION}"
            echo "sqlite_database_integration_commit=${SQLITE_DATABASE_INTEGRATION_COMMIT}"
            echo "update_cache_bust=${UPDATE_CACHE_BUST}"
            echo "version_tag=${version_tag}"
            echo "channel_tag=${channel_tag}"
          } >> "${GITHUB_OUTPUT}"

          cat <<EOF
          Resolved build inputs:
            branch=${branch}
            WORDPRESS_IMAGE=${WORDPRESS_IMAGE}
            SQLITE_DATABASE_INTEGRATION_COMMIT=${SQLITE_DATABASE_INTEGRATION_COMMIT}
            version_tag=${version_tag}
            channel_tag=${channel_tag}
          EOF

  build-platform:
    name: Build ${{ matrix.platform }}
    runs-on: ubuntu-latest
    needs: resolve-inputs
    timeout-minutes: 360

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            arch_tag: amd64
          - platform: linux/arm64
            arch_tag: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve image metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          arch="${{ matrix.arch_tag }}"
          version_tag="${{ needs.resolve-inputs.outputs.version_tag }}"
          channel_tag="${{ needs.resolve-inputs.outputs.channel_tag }}"

          {
            echo "image=${image}"
            echo "version_tag=${version_tag}"
            echo "channel_tag=${channel_tag}"
            echo "normal_version_arch_ref=${image}:${version_tag}-${arch}"
            echo "normal_channel_arch_ref=${image}:${channel_tag}-${arch}"
            echo "flat_version_arch_ref=${image}:${version_tag}-flat-${arch}"
            echo "flat_channel_arch_ref=${image}:${channel_tag}-flat-${arch}"
          } >> "${GITHUB_OUTPUT}"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push normal multi-layer image for ${{ matrix.platform }}
        shell: bash
        run: |
          set -euxo pipefail

          docker buildx build \
            --platform "${{ matrix.platform }}" \
            --pull \
            --push \
            --build-arg WORDPRESS_IMAGE="${{ needs.resolve-inputs.outputs.wordpress_image }}" \
            --build-arg SQLITE_DATABASE_INTEGRATION_VERSION="${{ needs.resolve-inputs.outputs.sqlite_database_integration_version }}" \
            --build-arg SQLITE_DATABASE_INTEGRATION_COMMIT="${{ needs.resolve-inputs.outputs.sqlite_database_integration_commit }}" \
            --build-arg WORDPRESS_HTTP_PORT="${{ needs.resolve-inputs.outputs.wordpress_http_port }}" \
            --build-arg UPDATE_CACHE_BUST="${{ needs.resolve-inputs.outputs.update_cache_bust }}" \
            -t "${{ steps.meta.outputs.normal_version_arch_ref }}" \
            -t "${{ steps.meta.outputs.normal_channel_arch_ref }}" \
            .

      - name: Pull normal image for flattening
        shell: bash
        run: |
          set -euxo pipefail
          docker pull --platform "${{ matrix.platform }}" "${{ steps.meta.outputs.normal_version_arch_ref }}"

      - name: Flatten image into a single layer for ${{ matrix.platform }}
        shell: bash
        run: |
          set -euxo pipefail

          tmp_container="wordpress-flatten-${{ matrix.arch_tag }}-${GITHUB_RUN_ID}"
          rootfs="$(mktemp --suffix=.tar)"

          cleanup() {
            docker rm -f "${tmp_container}" >/dev/null 2>&1 || true
            rm -f "${rootfs}"
          }
          trap cleanup EXIT

          docker create \
            --platform "${{ matrix.platform }}" \
            --name "${tmp_container}" \
            "${{ steps.meta.outputs.normal_version_arch_ref }}"
          docker export "${tmp_container}" -o "${rootfs}"

          docker import \
            --platform "${{ matrix.platform }}" \
            --change 'ENV PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin' \
            --change 'ENV PHP_INI_DIR=/usr/local/etc/php' \
            --change 'ENV APACHE_CONFDIR=/etc/apache2' \
            --change 'ENV APACHE_ENVVARS=/etc/apache2/envvars' \
            --change 'WORKDIR /var/www/html' \
            --change 'ENTRYPOINT ["docker-sqlite-entrypoint.sh"]' \
            --change 'CMD ["apache2-foreground"]' \
            --change 'EXPOSE 7860' \
            "${rootfs}" \
            "local-flat:${{ matrix.arch_tag }}"

      - name: Push single-layer image for ${{ matrix.platform }}
        shell: bash
        run: |
          set -euxo pipefail
          docker tag "local-flat:${{ matrix.arch_tag }}" "${{ steps.meta.outputs.flat_version_arch_ref }}"
          docker tag "local-flat:${{ matrix.arch_tag }}" "${{ steps.meta.outputs.flat_channel_arch_ref }}"
          docker push "${{ steps.meta.outputs.flat_version_arch_ref }}"
          docker push "${{ steps.meta.outputs.flat_channel_arch_ref }}"

  publish-manifests:
    name: Publish multi-arch manifests
    runs-on: ubuntu-latest
    needs:
      - resolve-inputs
      - build-platform
    timeout-minutes: 30

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve image metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          image="ghcr.io/${GITHUB_REPOSITORY,,}"

          {
            echo "image=${image}"
            echo "version_tag=${{ needs.resolve-inputs.outputs.version_tag }}"
            echo "channel_tag=${{ needs.resolve-inputs.outputs.channel_tag }}"
          } >> "${GITHUB_OUTPUT}"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifests
        shell: bash
        run: |
          set -euxo pipefail

          image="${{ steps.meta.outputs.image }}"
          version_tag="${{ steps.meta.outputs.version_tag }}"
          channel_tag="${{ steps.meta.outputs.channel_tag }}"

          collect_refs() {
            local base_tag="$1"
            local refs=()
            for arch in amd64 arm64; do
              local ref="${image}:${base_tag}-${arch}"
              if docker buildx imagetools inspect "${ref}" >/dev/null 2>&1; then
                refs+=("${ref}")
              else
                echo "Missing required image: ${ref}" >&2
                exit 1
              fi
            done
            printf '%s\n' "${refs[@]}"
          }

          create_manifest() {
            local target="$1"
            shift
            local refs=("$@")
            if [ "${#refs[@]}" -lt 2 ]; then
              echo "Not enough architecture images to create ${target}" >&2
              exit 1
            fi
            docker buildx imagetools create -t "${target}" "${refs[@]}"
          }

          mapfile -t normal_version_refs < <(collect_refs "${version_tag}")
          mapfile -t normal_channel_refs < <(collect_refs "${channel_tag}")
          mapfile -t flat_version_refs < <(collect_refs "${version_tag}-flat")
          mapfile -t flat_channel_refs < <(collect_refs "${channel_tag}-flat")

          create_manifest "${image}:${version_tag}" "${normal_version_refs[@]}"
          create_manifest "${image}:${channel_tag}" "${normal_channel_refs[@]}"
          create_manifest "${image}:${version_tag}-flat" "${flat_version_refs[@]}"
          create_manifest "${image}:${channel_tag}-flat" "${flat_channel_refs[@]}"

      - name: Inspect published manifests
        shell: bash
        run: |
          set -euxo pipefail

          image="${{ steps.meta.outputs.image }}"
          version_tag="${{ steps.meta.outputs.version_tag }}"
          channel_tag="${{ steps.meta.outputs.channel_tag }}"

          docker buildx imagetools inspect "${image}:${version_tag}"
          docker buildx imagetools inspect "${image}:${version_tag}-flat"
          docker buildx imagetools inspect "${image}:${channel_tag}"
          docker buildx imagetools inspect "${image}:${channel_tag}-flat"

          cat <<EOF
          Published normal multi-layer images:
            ${image}:${version_tag}
            ${image}:${channel_tag}

          Published single-layer images:
            ${image}:${version_tag}-flat
            ${image}:${channel_tag}-flat

          Per-architecture tags are also available with suffixes:
            -amd64, -arm64
          EOF
