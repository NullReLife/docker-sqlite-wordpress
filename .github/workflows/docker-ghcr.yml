name: Build and publish Docker images

on:
  push:
    branches:
      - main
      - native-parser
    paths:
      - Dockerfile
      - docker-compose.yml
      - scripts/**
      - .github/workflows/docker-ghcr.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-ghcr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-publish:
    name: Build, flatten, and publish
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      WORDPRESS_IMAGE: wordpress:7.0.0-php8.5-apache
      WORDPRESS_HTTP_PORT: "7860"
      SQLITE_DATABASE_INTEGRATION_VERSION: "2.2.23"
      SQLITE_DATABASE_INTEGRATION_COMMIT: e5513936c800f14b6795e7fce71505afad331b11

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          branch="${GITHUB_REF_NAME}"

          case "${branch}" in
            main)
              version_tag="7.0.0-php8.5-apache-sqlite-2.2.23"
              channel_tag="main"
              ;;
            native-parser)
              version_tag="7.0.0-php8.5-apache-native-parser"
              channel_tag="native-parser"
              ;;
            *)
              echo "Unsupported branch: ${branch}" >&2
              exit 1
              ;;
          esac

          {
            echo "image=${image}"
            echo "version_tag=${version_tag}"
            echo "channel_tag=${channel_tag}"
            echo "normal_version_ref=${image}:${version_tag}"
            echo "normal_channel_ref=${image}:${channel_tag}"
            echo "flat_version_ref=${image}:${version_tag}-flat"
            echo "flat_channel_ref=${image}:${channel_tag}-flat"
          } >> "${GITHUB_OUTPUT}"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build normal multi-layer image
        shell: bash
        run: |
          set -euxo pipefail

          docker build \
            --pull \
            --build-arg WORDPRESS_IMAGE="${WORDPRESS_IMAGE}" \
            --build-arg SQLITE_DATABASE_INTEGRATION_VERSION="${SQLITE_DATABASE_INTEGRATION_VERSION}" \
            --build-arg SQLITE_DATABASE_INTEGRATION_COMMIT="${SQLITE_DATABASE_INTEGRATION_COMMIT}" \
            --build-arg WORDPRESS_HTTP_PORT="${WORDPRESS_HTTP_PORT}" \
            -t "${{ steps.meta.outputs.normal_version_ref }}" \
            -t "${{ steps.meta.outputs.normal_channel_ref }}" \
            .

      - name: Test normal multi-layer image
        shell: bash
        run: |
          set -euxo pipefail

          container="wordpress-normal-test-${GITHUB_RUN_ID}"
          volume_dir="$(mktemp -d)"

          cleanup() {
            docker rm -f "${container}" >/dev/null 2>&1 || true
            rm -rf "${volume_dir}"
          }
          trap cleanup EXIT

          docker run -d \
            --name "${container}" \
            -p 18080:7860 \
            -v "${volume_dir}:/var/www/html" \
            "${{ steps.meta.outputs.normal_version_ref }}"

          for i in $(seq 1 90); do
            if curl -fsSL http://127.0.0.1:18080/wp-admin/install.php >/dev/null; then
              break
            fi
            sleep 1
          done

          curl -fsSL http://127.0.0.1:18080/wp-admin/install.php >/dev/null
          docker exec "${container}" test -f /var/www/html/wp-config.php
          docker exec "${container}" test -f /var/www/html/wp-content/db.php
          docker exec "${container}" test -d /var/www/html/wp-content/mu-plugins/sqlite-database-integration
          docker exec "${container}" test -d /var/www/html/wp-content/database
          docker exec "${container}" sh -c "php -m | grep -Eiq '^(sqlite3|pdo_sqlite)$'"

          if [ "${GITHUB_REF_NAME}" = "native-parser" ]; then
            docker exec "${container}" sh -c "php -m | grep -qx wp_mysql_parser"
          fi

      - name: Push normal multi-layer image
        shell: bash
        run: |
          set -euxo pipefail
          docker push "${{ steps.meta.outputs.normal_version_ref }}"
          docker push "${{ steps.meta.outputs.normal_channel_ref }}"

      - name: Flatten image into a single layer
        shell: bash
        run: |
          set -euxo pipefail

          tmp_container="wordpress-flatten-${GITHUB_RUN_ID}"
          rootfs="$(mktemp --suffix=.tar)"

          cleanup() {
            docker rm -f "${tmp_container}" >/dev/null 2>&1 || true
            rm -f "${rootfs}"
          }
          trap cleanup EXIT

          docker create --name "${tmp_container}" "${{ steps.meta.outputs.normal_version_ref }}"
          docker export "${tmp_container}" -o "${rootfs}"

          docker import \
            --change 'ENV PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin' \
            --change 'WORKDIR /var/www/html' \
            --change 'ENTRYPOINT ["docker-entrypoint.sh"]' \
            --change 'CMD ["apache2-foreground"]' \
            --change 'EXPOSE 7860' \
            "${rootfs}" \
            "${{ steps.meta.outputs.flat_version_ref }}"

          docker tag "${{ steps.meta.outputs.flat_version_ref }}" "${{ steps.meta.outputs.flat_channel_ref }}"

      - name: Test single-layer image
        shell: bash
        run: |
          set -euxo pipefail

          container="wordpress-flat-test-${GITHUB_RUN_ID}"
          volume_dir="$(mktemp -d)"

          cleanup() {
            docker rm -f "${container}" >/dev/null 2>&1 || true
            rm -rf "${volume_dir}"
          }
          trap cleanup EXIT

          docker run -d \
            --name "${container}" \
            -p 18081:7860 \
            -v "${volume_dir}:/var/www/html" \
            "${{ steps.meta.outputs.flat_version_ref }}"

          for i in $(seq 1 90); do
            if curl -fsSL http://127.0.0.1:18081/wp-admin/install.php >/dev/null; then
              break
            fi
            sleep 1
          done

          curl -fsSL http://127.0.0.1:18081/wp-admin/install.php >/dev/null
          docker exec "${container}" test -f /var/www/html/wp-config.php
          docker exec "${container}" test -f /var/www/html/wp-content/db.php
          docker exec "${container}" test -d /var/www/html/wp-content/mu-plugins/sqlite-database-integration
          docker exec "${container}" test -d /var/www/html/wp-content/database
          docker exec "${container}" sh -c "php -m | grep -Eiq '^(sqlite3|pdo_sqlite)$'"

          if [ "${GITHUB_REF_NAME}" = "native-parser" ]; then
            docker exec "${container}" sh -c "php -m | grep -qx wp_mysql_parser"
          fi

      - name: Push single-layer image
        shell: bash
        run: |
          set -euxo pipefail
          docker push "${{ steps.meta.outputs.flat_version_ref }}"
          docker push "${{ steps.meta.outputs.flat_channel_ref }}"

      - name: Show published image refs
        shell: bash
        run: |
          cat <<EOF
          Published normal multi-layer images:
            ${{ steps.meta.outputs.normal_version_ref }}
            ${{ steps.meta.outputs.normal_channel_ref }}

          Published single-layer images:
            ${{ steps.meta.outputs.flat_version_ref }}
            ${{ steps.meta.outputs.flat_channel_ref }}
          EOF
